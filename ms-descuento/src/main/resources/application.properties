server:
  port: 8082

spring:
  application:
    name: ms-descuento
    
  datasource:
    # Cambiado a host.docker.internal
    url: jdbc:mysql://host.docker.internal:3306/db_descuento?createDatabaseIfNotExist=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog.sql