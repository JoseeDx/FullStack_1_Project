server.port=8082

spring.application.name=ms-descuento

# Cambiado a host.docker.internal
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/db_descuento?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.liquibase.change-log=classpath:db/changelog/db.changelog.sql
