server:
  port: 8087

spring:
  application:
    name: ms-resena
  
  datasource:
    # Cambiado a host.docker.internal manteniendo tus parámetros de SSL y Timezone
    url: jdbc:mysql://host.docker.internal:3306/resena_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog.sql