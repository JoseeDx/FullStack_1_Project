server.port=9091

spring.application.name=cliente-service

# Cambiado a host.docker.internal para conectar con tu Laragon
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/bd_cliente?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.liquibase.change-log=classpath:db/changelog/db.changelog.sql
