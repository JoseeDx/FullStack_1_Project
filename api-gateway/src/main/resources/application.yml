server:
  port: 9090

spring:
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          routes:
          - id: cliente-service
            uri: http://localhost:9091
            predicates:
            - Path=/api/v1/clientes/**

          - id: ms-carrito
            uri: http://localhost:8084
            predicates:
            - Path=/api/v1/carrito/**

          - id: ms-pedido
            uri: http://localhost:9094
            predicates:
            - Path=/api/v1/pedidos/**

          - id: ms-producto
            uri: http://localhost:8081
            predicates:
            - Path=/api/v1/productos/**

          - id: ms-transaccion
            uri: http://localhost:8085
            predicates:
            - Path=/api/v1/transacciones/**